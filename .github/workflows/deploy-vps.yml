name: Deploy VPS Parcoursup

# Déploiement automatique sur le VPS OVH à chaque push sur la branche de travail
# ou sur main. Utilise les secrets GitHub : VPS_HOST, VPS_USER, VPS_PASSWORD.
on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch: # Permet aussi un déclenchement manuel depuis GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement SSH vers VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 3m
          script: |
            set -e
            cd /opt/salon-alternance
            BRANCH="${GITHUB_REF_NAME:-main}"
            echo "=== Déploiement branche : $BRANCH ==="

            # 1. Sauvegarde des fichiers data (gitignorés mais precieux)
            sudo cp data/parcoursup-candidates.json /tmp/cand.bak 2>/dev/null || true
            sudo cp data/parcoursup-config.json /tmp/cfg.bak 2>/dev/null || true
            sudo cp data/parcoursup-relances.json /tmp/rel.bak 2>/dev/null || true
            sudo cp data/parcoursup-queue.json /tmp/queue.bak 2>/dev/null || true

            # 2. Nettoie les modifications locales + récupère la dernière version
            sudo git stash -u 2>/dev/null || true
            sudo git fetch origin
            sudo git checkout "$BRANCH" 2>/dev/null || sudo git checkout -b "$BRANCH" "origin/$BRANCH"
            sudo git reset --hard "origin/$BRANCH"

            # 3. Restaure les data
            sudo cp /tmp/cand.bak data/parcoursup-candidates.json 2>/dev/null || true
            sudo cp /tmp/cfg.bak data/parcoursup-config.json 2>/dev/null || true
            sudo cp /tmp/rel.bak data/parcoursup-relances.json 2>/dev/null || true
            sudo cp /tmp/queue.bak data/parcoursup-queue.json 2>/dev/null || true

            # 4. Installe les dépendances si package.json a changé
            if sudo git diff HEAD@{1} HEAD --name-only 2>/dev/null | grep -q package.json; then
              echo "=== package.json modifié, npm install ==="
              sudo npm install --no-audit --no-fund
            fi

            # 5. Redémarre le service
            sudo systemctl restart parcoursup
            sleep 5

            # 6. Vérifie que le service répond
            if curl -sf http://localhost:3002/health > /dev/null; then
              echo "=== ✅ DEPLOYED OK ==="
              curl -s http://localhost:3002/health
            else
              echo "=== ❌ ÉCHEC : le service ne répond pas ==="
              sudo systemctl status parcoursup --no-pager | head -20
              exit 1
            fi
