name: Export CLEM data from VPS

# Workflow de migration : se connecte au VPS, archive tous les fichiers
# de données sensibles de l'app CLEM (data + .env + uploads + auth WhatsApp),
# rapatrie l'archive sur le runner et l'expose comme artifact téléchargeable.
#
# Déclenchement MANUEL uniquement (workflow_dispatch).
#
# V2 : utilise sshpass + scp natifs sur le runner (au lieu de scp-action) pour
# fiabiliser le download. L'action appleboy/scp-action a un bug récurrent avec
# l'auth password (essaie le mauvais ordre d'auth methods).

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
    steps:
      - name: Installer sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

      - name: Préparer l'archive sur le VPS
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          script: |
            set -e
            echo "=== Préparation de l'export CLEM ==="
            cd /opt/salon-alternance-clem

            # Liste ce qu'on va archiver
            echo "[.env.parcoursup]" && sudo ls -la .env.parcoursup 2>&1 || echo "(absent)"
            echo "[data/]" && sudo du -sh data/ 2>&1 || echo "(absent)"

            # Crée l'archive : data complète + .env + scripts utiles
            # Chemin FIXE pour faciliter le scp (pas de timestamp)
            sudo tar czf /tmp/clem-migration.tar.gz \
              -C /opt/salon-alternance-clem \
              .env.parcoursup \
              data \
              auto-deploy.sh \
              setup-vps.sh 2>&1 | tail -20 || true

            sudo chown $(whoami):$(whoami) /tmp/clem-migration.tar.gz
            sudo chmod 644 /tmp/clem-migration.tar.gz
            echo "=== Archive créée ==="
            ls -lh /tmp/clem-migration.tar.gz
            echo "=== Top 40 fichiers ==="
            tar tzf /tmp/clem-migration.tar.gz | head -40
            echo "=== TOTAL FICHIERS ==="
            tar tzf /tmp/clem-migration.tar.gz | wc -l

      - name: Télécharger l'archive depuis le VPS (scp natif)
        run: |
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            "$VPS_USER@$VPS_HOST:/tmp/clem-migration.tar.gz" \
            ./clem-migration.tar.gz
          echo "=== Téléchargement réussi ==="
          ls -lh clem-migration.tar.gz
          echo "=== Taille ==="
          du -h clem-migration.tar.gz

      - name: Nettoyer l'archive temporaire sur le VPS
        if: always()
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          script: |
            sudo rm -f /tmp/clem-migration.tar.gz
            echo "Cleanup OK"

      - name: Renommer avec un timestamp (pour le nom de l'artifact)
        run: |
          STAMP=$(date +%Y%m%d-%H%M%S)
          mv clem-migration.tar.gz "clem-migration-$STAMP.tar.gz"
          ls -lh "clem-migration-$STAMP.tar.gz"

      - name: Upload comme artifact GitHub
        uses: actions/upload-artifact@v4
        with:
          name: clem-migration-data
          path: clem-migration-*.tar.gz
          retention-days: 7
          if-no-files-found: error
