<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B74F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009640;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icone mortarboard -->
  <g transform="translate(10,12) scale(0.55)">
    <polygon points="50,10 0,35 50,60 100,35" fill="url(#pg)"/>
    <rect x="46" y="35" width="8" height="30" fill="#00B74F" rx="2"/>
    <path d="M25,42 Q25,65 50,65 Q75,65 75,42" fill="none" stroke="#00B74F" stroke-width="4"/>
    <line x1="90" y1="35" x2="90" y2="60" stroke="#009640" stroke-width="3"/>
    <circle cx="90" cy="62" r="3" fill="#009640"/>
  </g>
  <!-- Texte Parcoursup -->
  <text x="72" y="38" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1A1A1A" letter-spacing="-0.5">
    Parcoursup
  </text>
  <text x="72" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#666666" letter-spacing="0.5">
    Votre avenir commence ici
  </text>
  <!-- Ligne verte decorative -->
  <rect x="72" y="60" width="60" height="2.5" rx="1.25" fill="url(#pg)"/>
</svg>
