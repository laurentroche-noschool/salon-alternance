<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90">
  <!-- Logo Parcoursup officiel : bleu marine #1B2A6B -->
  <!-- Icone chapeau de graduation (mortarboard) a gauche -->
  <g transform="translate(8,18) scale(0.6)" fill="#1B2A6B">
    <!-- Plateau du chapeau (losange vu en perspective) -->
    <polygon points="50,6 2,32 50,58 98,32" />
    <!-- Calotte ronde sous le plateau -->
    <path d="M18,38 Q18,62 50,62 Q82,62 82,38 L82,32 Q50,50 18,32 Z" />
    <!-- Cordon qui pend a droite -->
    <line x1="88" y1="32" x2="88" y2="58" stroke="#1B2A6B" stroke-width="3.5" />
    <!-- Pompon au bout du cordon -->
    <circle cx="88" cy="62" r="4" />
  </g>
  <!-- Mot "Parcoursup" en bleu marine, gras -->
  <text x="78" y="56" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#1B2A6B" letter-spacing="-0.8">
    Parcoursup
  </text>
</svg>
