                      onAddRelance({ candidateId: candidate.id, type: 'telephone', notes: `Appel vers ${form.telephone}`, result: 'autre', createdBy: '' });
                    }}>
                      <Icon name="phone" size={14} /> Appeler
                    </a>
                  )}
                  {form.email && (
                    <a href={`mailto:${form.email}?subject=${encodeURIComponent(`Votre candidature ${form.formation || ''} - ${form.ecole || ''}`)}&body=${encodeURIComponent(`Bonjour ${form.prenom || ''},\n\nNous avons bien reçu votre candidature pour la formation ${form.formation || ''} au sein de ${form.ecole || ''}.\n\nNous souhaitions échanger avec vous concernant votre dossier.\n\nN'hésitez pas à nous recontacter.\n\nCordialement,\nService Admissions`)}`} className="quick-action email" onClick={() => {
                      onAddRelance({ candidateId: candidate.id, type: 'mail', notes: `Email envoyé à ${form.email}`, result: 'envoye', createdBy: '' });
                    }}>
                      <Icon name="mail" size={14} /> Email
                    </a>
                  )}
                  {form.telephone && (
                    <a href={`https://wa.me/${phoneClean}?text=${encodeURIComponent(`Bonjour ${form.prenom || ''} ! 😊\n\nNous avons bien reçu votre candidature pour ${form.formation || ''} chez ${form.ecole || ''}.\n\nPouvons-nous échanger à ce sujet ?\n\nCordialement, Service Admissions`)}`} target="_blank" className="quick-action whatsapp" onClick={() => {
                      onAddRelance({ candidateId: candidate.id, type: 'whatsapp', notes: `WhatsApp envoyé à ${form.telephone}`, result: 'envoye', createdBy: '' });
                    }}>
                      <Icon name="message-circle" size={14} /> WhatsApp
                    </a>
                  )}
                </div>
              </div>

              <div className="drawer-section">
                <h3>Nouvelle relance</h3>
                <div className="form-row">
                  <div className="form-group">
                    <label>Type</label>
                    <select value={relanceForm.type} onChange={e => setRelanceForm(f => ({ ...f, type: e.target.value }))}>
                      {config.relanceTypes.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Résultat</label>
                    <select value={relanceForm.result} onChange={e => setRelanceForm(f => ({ ...f, result: e.target.value }))}>
                      {config.relanceResults.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-row">
                  <div className="form-group">
                    <label>Par</label>
                    <select value={relanceForm.createdBy} onChange={e => setRelanceForm(f => ({ ...f, createdBy: e.target.value }))}>
                      <option value="">--</option>
                      {config.chargesAdmission.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-group">
                  <label>Notes</label>
                  <textarea
                    value={relanceForm.notes}
                    onChange={e => setRelanceForm(f => ({ ...f, notes: e.target.value }))}
                    placeholder="Détails de la relance..."
                    rows={2}
                  />
                </div>
                <button className="btn btn-primary" onClick={handleAddRelance} style={{ marginTop: 8 }}>
                  <Icon name="plus" size={14} /> Enregistrer la relance
                </button>
              </div>

              <div className="drawer-section">
                <h3>Historique des relances ({sortedRelances.length})</h3>
                {sortedRelances.length === 0 && (
                  <p style={{ color: '#aaa', fontSize: 13 }}>Aucune relance enregistrée</p>
                )}
                <div className="timeline">
                  {sortedRelances.map(r => {
                    const typeInfo = config.relanceTypes.find(t => t.id === r.type);
                    const resultInfo = config.relanceResults.find(x => x.id === r.result);
                    const typeColors = { telephone: '#3498DB', mail: '#E74C3C', whatsapp: '#25D366', courrier: '#9B59B6' };
                    return (
                      <div key={r.id} className="timeline-item">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                          <span className="type" style={{ color: typeColors[r.type] || '#555' }}>
                            {typeInfo?.label || r.type}
                          </span>
                          <span className="date">{new Date(r.date).toLocaleDateString('fr-FR')} {new Date(r.date).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</span>
                        </div>
                        {r.notes && <div className="notes">{r.notes}</div>}
                        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                          {resultInfo && <span className="result">{resultInfo.label}</span>}
                          {r.createdBy && <span style={{ fontSize: 11, color: '#888' }}>par {r.createdBy}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        </>
      );
    }

    // ============ ADD CANDIDATE MODAL ============
    function AddCandidateModal({ config, onClose, onAdd }) {
      const [form, setForm] = useState({
        nom: '', prenom: '', telephone: '', email: '',
        ecole: '', formation: '', chargeAdmission: '', conseillerFormation: '',
        stage: 'voeu_recu', statutCRM: false, notes: ''
      });

      const handleChange = (field, value) => {
        const updated = { ...form, [field]: value };
        if (field === 'ecole' || field === 'formation') {
          const ecole = field === 'ecole' ? value : form.ecole;
          const formation = field === 'formation' ? value : form.formation;
          if (ecole && formation && config.ecoles[ecole]?.formations[formation]) {
            updated.conseillerFormation = config.ecoles[ecole].formations[formation].conseiller || '';
          }
          if (field === 'ecole') updated.formation = '';
        }
        setForm(updated);
      };

      const formations = form.ecole && config.ecoles[form.ecole]
        ? Object.keys(config.ecoles[form.ecole].formations)
        : [];

      const handleSubmit = () => {
        if (!form.nom || !form.prenom) return alert('Nom et prénom requis');
        onAdd(form);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h2>Nouveau candidat</h2>
              <button className="btn btn-icon btn-outline" onClick={onClose}><Icon name="x" size={18} /></button>
            </div>
            <div className="modal-body">
              <div className="form-row">
                <div className="form-group">
                  <label>Nom *</label>
                  <input value={form.nom} onChange={e => handleChange('nom', e.target.value)} autoFocus />
                </div>
                <div className="form-group">
                  <label>Prénom *</label>
                  <input value={form.prenom} onChange={e => handleChange('prenom', e.target.value)} />
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label>Téléphone</label>
                  <input value={form.telephone} onChange={e => handleChange('telephone', e.target.value)} />
                </div>
                <div className="form-group">
                  <label>Email</label>
                  <input type="email" value={form.email} onChange={e => handleChange('email', e.target.value)} />
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label>École</label>
                  <select value={form.ecole} onChange={e => handleChange('ecole', e.target.value)}>
                    <option value="">-- Choisir --</option>
                    {Object.keys(config.ecoles).map(e => <option key={e} value={e}>{e}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Formation</label>
                  <select value={form.formation} onChange={e => handleChange('formation', e.target.value)}>
                    <option value="">-- Choisir --</option>
                    {formations.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label>Chargé d'admission</label>
                  <select value={form.chargeAdmission} onChange={e => handleChange('chargeAdmission', e.target.value)}>
                    <option value="">-- Choisir --</option>
                    {config.chargesAdmission.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Conseiller en formation</label>
                  <input value={form.conseillerFormation} onChange={e => handleChange('conseillerFormation', e.target.value)} placeholder="Auto-rempli ou saisie libre" />
                </div>
              </div>
              <div className="form-group">
                <label
                  className="toggle"
                  onClick={() => handleChange('statutCRM', !form.statutCRM)}
                  style={{ marginTop: 8 }}
                >
                  <div className={`toggle-switch ${form.statutCRM ? 'on' : ''}`} />
                  Déjà inscrit dans le CRM
                </label>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={onClose}>Annuler</button>
              <button className="btn btn-primary" onClick={handleSubmit}>
                <Icon name="plus" size={14} /> Ajouter
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============ BULK SEND MODAL (2 modes: envoi immédiat OU automatisation) ============
    function BulkSendModal({ config, stageId, candidates, onClose, onSend, onSaveAutomation }) {
      const [mode, setMode] = useState('immediate'); // 'immediate' ou 'auto'
      const stageInfo = config.stages.find(s => s.id === stageId);
      const stageAuto = (config.automations || {})[stageId] || { enabled: false, actions: [] };

      // === Mode Envoi Immédiat ===
      const [channel, setChannel] = useState('mail');
      const [subject, setSubject] = useState('');
      const [message, setMessage] = useState('');
      const [imageUrl, setImageUrl] = useState('');
      const [delayMinutes, setDelayMinutes] = useState(0);
      const [delayUnit, setDelayUnit] = useState('minutes');

      // === Mode Automatisation ===
      const [actions, setActions] = useState(
        stageAuto.actions && stageAuto.actions.length > 0
          ? stageAuto.actions.map(a => ({ ...a }))
          : [{ channel: 'mail', subject: '', message: '', delayMinutes: 10 }]
      );
      const [autoEnabled, setAutoEnabled] = useState(stageAuto.enabled || false);

      const emailCount = candidates.filter(c => c.email).length;
      const phoneCount = candidates.filter(c => c.telephone).length;
      const templateVars = ['{{prenom}}', '{{nom}}', '{{formation}}', '{{ecole}}', '{{email}}', '{{telephone}}', '{{chargeAdmission}}', '{{conseillerFormation}}', '{{telCharge}}', '{{telConseiller}}'];

      const getDelayInMinutes = () => {
        const val = parseInt(delayMinutes) || 0;
        if (delayUnit === 'heures') return val * 60;
        if (delayUnit === 'jours') return val * 60 * 24;
        return val;
      };

      const formatDelay = (mins) => {
        if (mins < 60) return `${mins} min`;
        if (mins < 1440) return `${Math.round(mins/60)}h`;
        return `${Math.round(mins/1440)}j`;
      };

      const addAction = () => {
        const lastDelay = actions.length > 0 ? (actions[actions.length - 1].delayMinutes || 0) : 0;
        setActions([...actions, { channel: 'mail', subject: '', message: '', delayMinutes: lastDelay + 30 }]);
      };

      const updateAction = (idx, field, value) => {
        const updated = [...actions];
        updated[idx] = { ...updated[idx], [field]: value };
        setActions(updated);
      };

      const removeAction = (idx) => {
        setActions(actions.filter((_, i) => i !== idx));
      };

      const handleSaveAuto = async () => {
        // Auto-enable if there are actions with content
        const shouldEnable = actions.length > 0 && actions.some(a => a.message?.trim());
        const finalEnabled = shouldEnable ? true : autoEnabled;
        onSaveAutomation(stageId, { enabled: finalEnabled, actions, id: stageId });

        // If enabled and there are candidates already in the column, propose retroactive trigger
        if (finalEnabled && candidates.length > 0) {
          const doTrigger = confirm(
            `Automatisation sauvegardée et activée !\n\n` +
            `Il y a ${candidates.length} candidat(s) déjà dans "${stageInfo?.label}".\n` +
            `Voulez-vous déclencher l'automatisation pour eux maintenant ?\n\n` +
            `(Sinon, seuls les NOUVEAUX candidats déplacés dans cette colonne seront traités)`
          );
          if (doTrigger) {
            try {
              const resp = await fetch('/parcoursup/api/automations/trigger-all', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stageId })
              });
              const data = await resp.json();
              if (data.triggered > 0) {
                alert(`${data.triggered} action(s) programmée(s) pour ${data.candidates} candidat(s) !\n\nLes messages seront envoyés selon les délais configurés.`);
              } else {
                alert('Automatisation déjà déclenchée pour tous les candidats de cette colonne.');
              }
            } catch (err) {
              alert('Erreur lors du déclenchement rétroactif.');
            }
          }
        }
        onClose();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ width: 720, maxHeight: '90vh' }}>
            <div className="modal-header">
              <h2><Icon name="send" size={20} /> {stageInfo?.label}</h2>
              <button className="btn btn-icon btn-outline" onClick={onClose}><Icon name="x" size={18} /></button>
            </div>

            {/* Toggle entre les 2 modes */}
            <div style={{ display: 'flex', borderBottom: '2px solid #eee' }}>
              <div
                onClick={() => setMode('immediate')}
                style={{
                  flex: 1, padding: '12px 16px', cursor: 'pointer', textAlign: 'center', fontSize: 14, fontWeight: 600,
                  background: mode === 'immediate' ? '#002FA7' : 'white', color: mode === 'immediate' ? 'white' : '#666',
                  transition: '0.2s'
                }}
              >
                <Icon name="send" size={16} /> Envoi immédiat
              </div>
              <div
                onClick={() => setMode('auto')}
                style={{
                  flex: 1, padding: '12px 16px', cursor: 'pointer', textAlign: 'center', fontSize: 14, fontWeight: 600,
                  background: mode === 'auto' ? '#002FA7' : 'white', color: mode === 'auto' ? 'white' : '#666',
                  transition: '0.2s'
                }}
              >
                ⚡ Automatisation à l'entrée
              </div>
            </div>

            <div className="modal-body" style={{ maxHeight: '60vh', overflowY: 'auto' }}>

              {/* ===== MODE ENVOI IMMEDIAT ===== */}
              {mode === 'immediate' && (
                <>
                  <div style={{ background: '#f0f7ff', padding: 12, borderRadius: 8, marginBottom: 16, fontSize: 13 }}>
                    <strong>{candidates.length}</strong> candidat(s) actuellement dans cette colonne
                    {' '}({emailCount} email, {phoneCount} tél)
                  </div>

                  {candidates.length === 0 && (
                    <div style={{ background: '#fff8e1', padding: 12, borderRadius: 8, marginBottom: 16, fontSize: 13 }}>
                      <Icon name="alert-triangle" size={14} color="#F39C12" /> Cette colonne est vide. Ajoutez des candidats ou utilisez le mode <strong>Automatisation</strong> pour déclencher des envois dès qu'une fiche y entre.
                    </div>
                  )}

                  <div className="form-row">
                    <div className="form-group">
                      <label>Canal d'envoi</label>
                      <select value={channel} onChange={e => setChannel(e.target.value)}>
                        <option value="mail">Email</option>
                        <option value="whatsapp">WhatsApp</option>
                      </select>
                    </div>
                    <div className="form-group">
                      <label>Délai avant envoi</label>
                      <div style={{ display: 'flex', gap: 6 }}>
                        <input type="number" min="0" value={delayMinutes} onChange={e => setDelayMinutes(e.target.value)} style={{ width: 80 }} />
                        <select value={delayUnit} onChange={e => setDelayUnit(e.target.value)}>
                          <option value="minutes">minutes</option>
                          <option value="heures">heures</option>
                          <option value="jours">jours</option>
                        </select>
                      </div>
                    </div>
                  </div>

                  {channel === 'mail' && (
                    <div className="form-group">
                      <label>Objet du mail</label>
                      <input value={subject} onChange={e => setSubject(e.target.value)} placeholder="Ex: Votre candidature {{formation}} - {{ecole}}" />
                    </div>
                  )}

                  <div className="form-group">
                    <label>Message</label>
                    <textarea value={message} onChange={e => setMessage(e.target.value)} rows={5}
                      placeholder={`Bonjour {{prenom}},\n\nNous avons bien reçu votre voeu pour {{formation}} à {{ecole}}.\n\nCordialement`} />
                  </div>

                  <div style={{ fontSize: 12, color: '#888', marginTop: 6 }}>
                    <strong>Variables :</strong>{' '}
                    {templateVars.map(v => (
                      <code key={v} style={{ background: '#f0f0f0', padding: '1px 5px', borderRadius: 4, cursor: 'pointer', marginRight: 4 }}
                        onClick={() => setMessage(m => m + v)}>{v}</code>
                    ))}
                  </div>

                  {channel === 'mail' && (
                    <div className="form-group" style={{ marginTop: 12 }}>
                      <label>Image / GIF (URL)</label>
                      <input value={imageUrl || ''} onChange={e => setImageUrl(e.target.value)}
                        placeholder="https://media.giphy.com/... ou lien vers une image" />
                      {imageUrl && (
                        <div style={{ marginTop: 8, padding: 8, background: '#f8f9fa', borderRadius: 8, textAlign: 'center' }}>
                          <img src={imageUrl} style={{ maxWidth: '100%', maxHeight: 150, borderRadius: 6 }} alt="Preview" onError={e => e.target.style.display = 'none'} />
                          <div style={{ fontSize: 11, color: '#aaa', marginTop: 4 }}>Aperçu de l'image</div>
                        </div>
                      )}
                    </div>
                  )}
                </>
              )}

              {/* ===== MODE AUTOMATISATION ===== */}
              {mode === 'auto' && (
                <>
                  <div style={{ background: '#f0f7ff', padding: 12, borderRadius: 8, marginBottom: 16, fontSize: 13 }}>
                    <strong>Dès qu'un candidat entre dans "{stageInfo?.label}"</strong>, les messages ci-dessous seront envoyés automatiquement selon le délai configuré. Chaque envoi est historisé dans la fiche du candidat.
                    <br/><span style={{ color: '#e67e22', fontWeight: 600 }}>💡 À la sauvegarde, si des candidats sont déjà dans cette colonne, vous pourrez déclencher l'automatisation pour eux aussi.</span>
                  </div>

                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
                    <label className="toggle" onClick={() => setAutoEnabled(!autoEnabled)}>
                      <div className={`toggle-switch ${autoEnabled ? 'on' : ''}`} />
                      <strong style={{ fontSize: 14 }}>Automatisation {autoEnabled ? 'activée' : 'désactivée'}</strong>
                    </label>
                  </div>

                  {actions.map((action, idx) => (
                    <div key={idx} style={{ background: '#f8f9fa', padding: 14, borderRadius: 10, marginBottom: 10, borderLeft: `4px solid ${stageInfo?.color || '#002FA7'}`, position: 'relative' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                        <strong style={{ fontSize: 14, color: '#333' }}>
                          Message N°{idx + 1}
                          <span style={{ fontWeight: 400, color: '#888', marginLeft: 8, fontSize: 12 }}>
                            (envoi à +{formatDelay(action.delayMinutes || 0)} après entrée)
                          </span>
                        </strong>
                        {actions.length > 1 && (
                          <button className="btn btn-icon" style={{ color: '#ccc' }} onClick={() => removeAction(idx)} title="Supprimer">
                            <Icon name="x" size={14} />
                          </button>
                        )}
                      </div>

                      <div className="form-row">
                        <div className="form-group" style={{ maxWidth: 140 }}>
                          <label>Canal</label>
                          <select value={action.channel} onChange={e => updateAction(idx, 'channel', e.target.value)}>
                            <option value="mail">Email</option>
                            <option value="whatsapp">WhatsApp</option>
                          </select>
                        </div>
                        <div className="form-group" style={{ maxWidth: 220 }}>
                          <label>Délai après entrée dans la colonne</label>
                          <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                            <input type="number" min="0" value={action.delayMinutes || 0}
                              onChange={e => updateAction(idx, 'delayMinutes', parseInt(e.target.value) || 0)}
                              style={{ width: 70 }} />
                            <span style={{ fontSize: 12, color: '#888' }}>minutes</span>
                            <span style={{ fontSize: 11, color: '#aaa', marginLeft: 4 }}>
                              ({formatDelay(action.delayMinutes || 0)})
                            </span>
                          </div>
                        </div>
                      </div>

                      {action.channel === 'mail' && (
                        <div className="form-group">
                          <label>Objet</label>
                          <input value={action.subject || ''} onChange={e => updateAction(idx, 'subject', e.target.value)}
                            placeholder="Ex: Votre candidature {{formation}} - Relance N°1" />
                        </div>
                      )}

                      <div className="form-group">
                        <label>Message</label>
                        <textarea value={action.message || ''} onChange={e => updateAction(idx, 'message', e.target.value)}
                          rows={3} placeholder="Bonjour {{prenom}}, ..." />
                      </div>

                      <div style={{ fontSize: 11, color: '#aaa' }}>
                        Variables : {templateVars.map(v => (
                          <code key={v} style={{ background: '#e8e8e8', padding: '0 4px', borderRadius: 3, cursor: 'pointer', marginRight: 3 }}
                            onClick={() => updateAction(idx, 'message', (action.message || '') + v)}>{v}</code>
                        ))}
                      </div>

                      {action.channel === 'mail' && (
                        <div className="form-group" style={{ marginTop: 8 }}>
                          <label>Image / GIF (URL)</label>
                          <input value={action.imageUrl || ''} onChange={e => updateAction(idx, 'imageUrl', e.target.value)}
                            placeholder="https://media.giphy.com/... ou lien image" />
                          {action.imageUrl && (
                            <div style={{ marginTop: 6, padding: 6, background: '#fff', borderRadius: 6, textAlign: 'center' }}>
                              <img src={action.imageUrl} style={{ maxWidth: '100%', maxHeight: 120, borderRadius: 4 }} alt="Preview" onError={e => e.target.style.display = 'none'} />
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  ))}

                  <button className="btn btn-outline" onClick={addAction} style={{ marginTop: 4 }}>
                    <Icon name="plus" size={14} /> Ajouter un message N°{actions.length + 1}
                  </button>

                  {/* Résumé visuel de la séquence */}
                  {actions.length > 0 && (
                    <div style={{ marginTop: 16, padding: 14, background: '#f0f7ff', borderRadius: 8, fontSize: 12 }}>
                      <strong>Résumé de la séquence :</strong>
                      <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column', gap: 4 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ background: stageInfo?.color, color: 'white', padding: '2px 8px', borderRadius: 6, fontSize: 11, fontWeight: 600 }}>
                            Candidat entre dans {stageInfo?.label}
                          </span>
                        </div>
                        {actions.map((a, i) => (
                          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginLeft: 16 }}>
                            <span style={{ color: '#aaa' }}>↓ +{formatDelay(a.delayMinutes || 0)}</span>
                            <span style={{
                              padding: '2px 8px', borderRadius: 6, fontSize: 11, fontWeight: 600, color: 'white',
                              background: a.channel === 'mail' ? '#E74C3C' : '#25D366'
                            }}>
                              {a.channel === 'mail' ? 'Email' : 'WhatsApp'} N°{i+1}
                            </span>
                            <span style={{ color: '#888' }}>{a.subject || (a.message || '').substring(0, 40) || '(message à rédiger)'}{(a.message || '').length > 40 ? '...' : ''}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>

            <div className="modal-footer">
              <button className="btn btn-outline" onClick={onClose}>Annuler</button>
              {mode === 'immediate' && (
                <button className="btn btn-primary"
                  onClick={() => onSend(channel, subject, message, getDelayInMinutes(), imageUrl)}
                  disabled={!message.trim() || candidates.length === 0}>
                  <Icon name="send" size={14} />{' '}
                  {parseInt(delayMinutes) > 0 ? 'Programmer' : 'Envoyer'} à {candidates.length} candidat(s)
                </button>
              )}
              {mode === 'auto' && (
                <button className="btn btn-success" onClick={handleSaveAuto}
                  disabled={actions.some(a => !a.message?.trim())}>
                  <Icon name="check" size={14} /> Sauvegarder l'automatisation ({actions.length} message{actions.length > 1 ? 's' : ''})
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============ AUTOMATIONS VIEW ============
    function WhatsAppConfig() {
      const [status, setStatus] = useState({ status: 'disconnected' });
      const [loading, setLoading] = useState(false);

      const authHeaders = { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };

      const fetchStatus = () => {
        fetch('/parcoursup/api/whatsapp/status', { headers: authHeaders }).then(r => r.json()).then(d => { if (!d.error) setStatus(d); }).catch(() => {});
      };

      useEffect(() => {
        fetchStatus();
        const interval = setInterval(fetchStatus, 3000);
        return () => clearInterval(interval);
      }, []);

      const handleReconnect = async () => {
        setLoading(true);
        await fetch('/parcoursup/api/whatsapp/reconnect', { method: 'POST', headers: authHeaders });
        let attempts = 0;
        const pollQR = setInterval(() => {
          fetchStatus();
          attempts++;
          if (attempts > 10) { clearInterval(pollQR); setLoading(false); }
        }, 2000);
        setTimeout(() => { setLoading(false); clearInterval(pollQR); fetchStatus(); }, 15000);
      };

      const handleLogout = async () => {
        if (!confirm('Déconnecter WhatsApp ?')) return;
        await fetch('/parcoursup/api/whatsapp/logout', { method: 'POST', headers: authHeaders });
        fetchStatus();
      };

      const statusColor = status.status === 'connected' ? '#2ECC71' : status.status === 'qr_pending' ? '#F39C12' : '#E74C3C';
      const statusLabel = {
        connected: 'Connecté',
        qr_pending: 'En attente du scan QR',
        disconnected: 'Déconnecté',
        unavailable: 'Indisponible (Chromium manquant)',
        error: 'Erreur'
      }[status.status] || 'Inconnu';

      return (
        <div style={{ marginBottom: 32 }}>
          <h2 style={{ fontSize: 18, marginBottom: 12 }}>Configuration WhatsApp (gratuit)</h2>
          <div className="chart-container" style={{ borderLeft: '4px solid #25D366' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{ width: 12, height: 12, borderRadius: '50%', background: statusColor, boxShadow: `0 0 8px ${statusColor}` }} />
                <strong style={{ fontSize: 15 }}>{statusLabel}</strong>
              </div>
              {status.status === 'connected' && status.phone && (
                <span style={{ fontSize: 13, color: '#888' }}>
                  {status.name || ''} (+{status.phone})
                </span>
              )}
              <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
                {status.status !== 'connected' && (
                  <button className="btn btn-sm btn-success" onClick={handleReconnect} disabled={loading}>
                    {loading ? 'Connexion...' : 'Connecter WhatsApp'}
                  </button>
                )}
                {status.status === 'connected' && (
                  <button className="btn btn-sm btn-outline" onClick={handleLogout}>Déconnecter</button>
                )}
              </div>
            </div>

            {status.status === 'qr_pending' && status.qrCode && (
              <div style={{ textAlign: 'center', padding: 20, background: '#f8f9fa', borderRadius: 12, marginBottom: 16 }}>
                <p style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: '#333' }}>
                  Scannez ce QR Code avec WhatsApp sur votre téléphone :
                </p>
                <p style={{ fontSize: 12, color: '#888', marginBottom: 16 }}>
                  WhatsApp &gt; Menu (trois points) &gt; Appareils connectés &gt; Connecter un appareil
                </p>
                <img src={status.qrCode} alt="QR Code WhatsApp" style={{ width: 280, height: 280, borderRadius: 12, border: '2px solid #25D366' }} />
              </div>
            )}

            {status.status === 'connected' && (
              <div style={{ padding: 12, background: '#e8f5e9', borderRadius: 8, fontSize: 13, color: '#2e7d32' }}>
                WhatsApp est connecté et prêt à envoyer des messages automatiques. Les messages programmés dans la file d'attente seront envoyés automatiquement aux candidats.
              </div>
            )}

            {status.status === 'disconnected' && (
              <div style={{ padding: 12, background: '#fff3e0', borderRadius: 8, fontSize: 13, color: '#e65100' }}>
                WhatsApp n'est pas connecté. Cliquez sur "Connecter WhatsApp" puis scannez le QR Code pour activer l'envoi automatique.
                Les messages en attente seront envoyés dès la connexion.
              </div>
            )}

            {status.status === 'error' && (
              <div style={{ padding: 12, background: '#fce4ec', borderRadius: 8, fontSize: 13, color: '#c62828' }}>
                Erreur de connexion WhatsApp. Essayez de vous reconnecter.
              </div>
            )}
          </div>
        </div>
      );
    }

    function SmtpConfig() {
      const [smtp, setSmtp] = useState({ host: '', port: 587, user: '', pass: '', fromName: 'CRM Parcoursup' });
      const [status, setStatus] = useState(null); // null, 'loading', 'success', 'error'
      const [message, setMessage] = useState('');
      const [loaded, setLoaded] = useState(false);
      const [showPass, setShowPass] = useState(false);

      useEffect(() => {
        fetch('/parcoursup/api/smtp-config').then(r => r.json()).then(data => {
          setSmtp(prev => ({ ...prev, host: data.host || '', port: data.port || 587, user: '', fromName: data.fromName || 'CRM Parcoursup' }));
          if (data.configured) {
            setStatus('configured');
            setMessage(`SMTP configuré (${data.user}@${data.host})`);
          }
          setLoaded(true);
        }).catch(() => setLoaded(true));
      }, []);

      const handleSave = async () => {
        if (!smtp.host || !smtp.user || !smtp.pass) {
          setStatus('error'); setMessage('Tous les champs sont requis');
          return;
        }
        setStatus('loading'); setMessage('Sauvegarde...');
        try {
          await fetch('/parcoursup/api/smtp-config', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(smtp)
          });
          setStatus('loading'); setMessage('Test de connexion...');
          const test = await fetch('/parcoursup/api/smtp-test', { method: 'POST' });
          const result = await test.json();
          if (result.ok) {
            setStatus('success'); setMessage('SMTP configuré et connecté !');
          } else {
            setStatus('error'); setMessage(`Erreur: ${result.error}`);
          }
        } catch (e) {
          setStatus('error'); setMessage(`Erreur: ${e.message}`);
        }
      };

      if (!loaded) return null;

      return (
        <div style={{ marginBottom: 32 }}>
          <h2 style={{ fontSize: 18, marginBottom: 12 }}>Configuration Email (SMTP)</h2>
          <div className="chart-container" style={{ borderLeft: '4px solid #E74C3C' }}>
            <p style={{ fontSize: 13, color: '#666', marginBottom: 16 }}>
              Configurez votre serveur SMTP pour que les emails automatiques soient <strong>réellement envoyés</strong> aux candidats.
              Pour Gmail : utilisez <code>smtp.gmail.com</code>, port <code>587</code>, et un <strong>mot de passe d'application</strong> (pas votre mot de passe Gmail).
            </p>

            <div className="form-row">
              <div className="form-group">
                <label>Serveur SMTP</label>
                <input value={smtp.host} onChange={e => setSmtp(s => ({...s, host: e.target.value}))} placeholder="smtp.gmail.com" />
              </div>
              <div className="form-group" style={{ maxWidth: 100 }}>
                <label>Port</label>
                <input type="number" value={smtp.port} onChange={e => setSmtp(s => ({...s, port: parseInt(e.target.value) || 587}))} />
              </div>
            </div>

            <div className="form-row">
              <div className="form-group">
                <label>Email / Identifiant</label>
                <input value={smtp.user} onChange={e => setSmtp(s => ({...s, user: e.target.value}))} placeholder="votre.email@gmail.com" />
              </div>
              <div className="form-group">
                <label>Mot de passe / App Password</label>
                <div style={{ position: 'relative' }}>
                  <input type={showPass ? 'text' : 'password'} value={smtp.pass} onChange={e => setSmtp(s => ({...s, pass: e.target.value}))}
                    placeholder="Mot de passe d'application" style={{ paddingRight: 40 }} />
                  <button type="button" onClick={() => setShowPass(!showPass)}
                    style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, color: '#888' }}>
                    {showPass ? 'Masquer' : 'Voir'}
                  </button>
                </div>
              </div>
            </div>

            <div className="form-row">
              <div className="form-group">
                <label>Nom d'expéditeur</label>
                <input value={smtp.fromName} onChange={e => setSmtp(s => ({...s, fromName: e.target.value}))} placeholder="Service Admissions" />
              </div>
            </div>

            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 12 }}>
              <button className="btn btn-primary" onClick={handleSave} disabled={status === 'loading'}>
                {status === 'loading' ? 'Test en cours...' : 'Sauvegarder & Tester'}
              </button>
              {status && status !== 'loading' && (
                <span style={{ fontSize: 13, fontWeight: 600,
                  color: status === 'success' || status === 'configured' ? '#2ECC71' : '#E74C3C' }}>
                  {message}
                </span>
              )}
            </div>

            <div style={{ marginTop: 16, padding: 12, background: '#fff8e1', borderRadius: 8, fontSize: 12, color: '#e65100' }}>
              <strong>Pour Gmail :</strong> Allez sur <a href="https://myaccount.google.com/apppasswords" target="_blank" style={{ color: '#e65100' }}>myaccount.google.com/apppasswords</a>,
              créez un "Mot de passe d'application" et utilisez-le ici. La validation en 2 étapes doit être activée.
              <br/><strong>Pour WhatsApp :</strong> Les messages WhatsApp ouvrent automatiquement WhatsApp Web/Desktop avec le message pré-rempli. L'envoi 100% automatique nécessite l'API WhatsApp Business (payante).
            </div>
          </div>
        </div>
      );
    }

    function CoordonneeConfig({ config, onSave }) {
      const [coordonnees, setCoordonnees] = useState(config.coordonnees || {});
      const [saved, setSaved] = useState(false);

      // Build conseillers map: name → Set of schools
      const conseillerSchools = {};
      Object.entries(config.ecoles || {}).forEach(([ecoleName, ecole]) => {
        Object.entries(ecole.formations || {}).forEach(([formName, f]) => {
          [f.conseiller, f.conseiller2].filter(Boolean).forEach(name => {
            if (!conseillerSchools[name]) conseillerSchools[name] = new Set();
            conseillerSchools[name].add(ecoleName);
          });
        });
      });

      // Chargé(e)s d'admission sorted alphabetically
      const charges = [...(config.chargesAdmission || [])].sort((a, b) => a.localeCompare(b, 'fr'));

      // Conseillers sorted alphabetically
      const conseillers = Object.entries(conseillerSchools)
        .map(([name, ecoles]) => ({ name, ecoles: [...ecoles].sort().join(' / ') }))
        .sort((a, b) => a.name.localeCompare(b.name, 'fr'));

      // School color mapping
      const ecoleColors = {};
      Object.entries(config.ecoles || {}).forEach(([name, e]) => { ecoleColors[name] = e.color || '#666'; });

      const updateField = (name, field, value) => {
        setCoordonnees(prev => ({ ...prev, [name]: { ...prev[name], [field]: value } }));
        setSaved(false);
      };

      const handleSave = () => {
        onSave(coordonnees);
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      const ContactRow = ({ name, badge }) => (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: '#f8f9fa', padding: '10px 16px', borderRadius: 8, flexWrap: 'wrap' }}>
          <span style={{ fontWeight: 700, fontSize: 14, minWidth: 100 }}>{name}</span>
          {badge && <span style={{ fontSize: 11, padding: '2px 10px', borderRadius: 12, background: badge.bg || '#eee', color: badge.color || '#333', fontWeight: 600, whiteSpace: 'nowrap' }}>{badge.text}</span>}
          <div style={{ display: 'flex', gap: 8, marginLeft: 'auto' }}>
            <input value={(coordonnees[name] || {}).telephone || ''} onChange={e => updateField(name, 'telephone', e.target.value)}
              placeholder="06 XX XX XX XX" style={{ width: 140, fontSize: 13, padding: '6px 10px' }} />
            <input value={(coordonnees[name] || {}).email || ''} onChange={e => updateField(name, 'email', e.target.value)}
              placeholder="email@ecole.fr" style={{ width: 180, fontSize: 13, padding: '6px 10px' }} />
          </div>
        </div>
      );

      return (
        <div style={{ marginBottom: 32 }}>
          <h2 style={{ fontSize: 18, marginBottom: 12 }}>Annuaire des équipes</h2>
          <div className="chart-container" style={{ borderLeft: '4px solid #002FA7' }}>
            <p style={{ fontSize: 13, color: '#666', marginBottom: 16 }}>
              Renseignez les <strong>téléphones</strong> et <strong>emails</strong> de l'équipe. Les téléphones sont utilisables via <code>{'{{telCharge}}'}</code> / <code>{'{{telConseiller}}'}</code>. L'email du chargé d'admission est utilisé comme <strong>Reply-To</strong> : les candidats répondront directement à leur chargé.
            </p>

            <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 8 }}>
              <i className="fas fa-headset" style={{ color: '#3498DB' }}></i> Chargé(e)s d'admission
            </h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 8, marginBottom: 20, maxWidth: 900 }}>
              {charges.map(name => {
                const chargeEcole = ['Giulia','Mathis'].includes(name) ? 'NOSCHOOL MDM'
                  : ['Lynn','Peyo','Kilian'].includes(name) ? 'NOSCHOOL'
                  : ['Lisa','Léo','Cécilia'].includes(name) ? 'WILL.SCHOOL' : null;
                const badgeColor = chargeEcole ? (ecoleColors[chargeEcole] || '#666') : null;
                return <ContactRow key={name} name={name}
                  badge={chargeEcole ? { text: chargeEcole, bg: badgeColor + '18', color: badgeColor } : null} />;
              })}
            </div>

            <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 8 }}>
              <i className="fas fa-chalkboard-teacher" style={{ color: '#27AE60' }}></i> Conseillers en formation
            </h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 8, marginBottom: 16, maxWidth: 900 }}>
              {conseillers.map(({ name, ecoles }) => {
                const schoolNames = ecoles.split(' / ');
                const mainColor = ecoleColors[schoolNames[0]] || '#666';
                return <ContactRow key={name} name={name} badge={{ text: ecoles, bg: mainColor + '18', color: mainColor }} />;
              })}
            </div>

            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <button className="btn btn-primary" onClick={handleSave}>Sauvegarder</button>
              {saved && <span style={{ color: '#2ECC71', fontWeight: 600, fontSize: 13 }}>Sauvegardé !</span>}
            </div>
          </div>
        </div>
      );
    }

    function AutomationsView({ config, candidates, queue, onSave, onCancelQueue, onRefreshQueue, api, onRefreshConfig }) {
      const [automations, setAutomations] = useState(config.automations || {});
      const [editingStage, setEditingStage] = useState(null);
      const [hasChanges, setHasChanges] = useState(false);

      const templateVars = ['{{prenom}}', '{{nom}}', '{{formation}}', '{{ecole}}', '{{email}}', '{{telephone}}', '{{chargeAdmission}}', '{{conseillerFormation}}', '{{telCharge}}', '{{telConseiller}}'];
      const pendingQueue = queue.filter(q => q.status === 'pending');
      const sentQueue = queue.filter(q => q.status === 'sent').slice(-50).reverse();

      const updateAutomation = (stageId, data) => {
        const updated = { ...automations, [stageId]: { ...automations[stageId], ...data } };
        setAutomations(updated);
        setHasChanges(true);
      };

      const addAction = (stageId) => {
        const stageAuto = automations[stageId] || { enabled: true, actions: [] };
        stageAuto.actions = [...(stageAuto.actions || []), { channel: 'mail', subject: '', message: '', delayMinutes: 0 }];
        updateAutomation(stageId, stageAuto);
      };

      const updateAction = (stageId, actionIdx, field, value) => {
        const stageAuto = { ...automations[stageId] };
        stageAuto.actions = [...stageAuto.actions];
        stageAuto.actions[actionIdx] = { ...stageAuto.actions[actionIdx], [field]: value };
        updateAutomation(stageId, stageAuto);
      };

      const removeAction = (stageId, actionIdx) => {
        const stageAuto = { ...automations[stageId] };
        stageAuto.actions = stageAuto.actions.filter((_, i) => i !== actionIdx);
        updateAutomation(stageId, stageAuto);
      };

      const handleSave = () => {
        onSave(automations);
        setHasChanges(false);
      };

      return (
        <div className="dashboard" style={{ maxWidth: 1100 }}>
          {/* Connexions WhatsApp + SMTP en premier */}
          <WhatsAppConfig />
          <SmtpConfig />
          <CoordonneeConfig config={config} onSave={async (coordonnees) => {
            await api('/config', { method: 'POST', body: { ...config, coordonnees } });
            onRefreshConfig && onRefreshConfig();
          }} />

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div>
              <h2 style={{ fontSize: 20 }}>Automatisations par colonne</h2>
              <p style={{ color: '#888', fontSize: 13, marginTop: 4 }}>
                Configurez des envois automatiques (Mail/WhatsApp) déclenchés quand un candidat entre dans une colonne.
                Chaque envoi est historisé dans la fiche du candidat.
              </p>
            </div>
            {hasChanges && (
              <button className="btn btn-success" onClick={handleSave}>
                <Icon name="check" size={14} /> Sauvegarder
              </button>
            )}
          </div>

          {/* Automation rules per stage */}
          <div style={{ display: 'grid', gap: 16, marginBottom: 32 }}>
            {config.stages.map(stage => {
              const stageAuto = automations[stage.id] || { enabled: false, actions: [] };
              const isExpanded = editingStage === stage.id;
              const stageCount = candidates.filter(c => c.stage === stage.id).length;

              return (
                <div key={stage.id} className="chart-container" style={{ borderLeft: `4px solid ${stage.color}` }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <label className="toggle" onClick={() => {
                        updateAutomation(stage.id, { ...stageAuto, enabled: !stageAuto.enabled, actions: stageAuto.actions || [] });
                      }}>
                        <div className={`toggle-switch ${stageAuto.enabled ? 'on' : ''}`} />
                      </label>
                      <div>
                        <h3 style={{ margin: 0, fontSize: 15 }}>{stage.label}</h3>
                        <span style={{ fontSize: 12, color: '#888' }}>{stageCount} candidat(s) | {(stageAuto.actions || []).length} action(s)</span>
                      </div>
                    </div>
                    <button className="btn btn-sm btn-outline" onClick={() => setEditingStage(isExpanded ? null : stage.id)}>
                      {isExpanded ? 'Réduire' : 'Configurer'}
                    </button>
                  </div>

                  {isExpanded && (
                    <div style={{ marginTop: 16, paddingTop: 16, borderTop: '1px solid #eee' }}>
                      {(stageAuto.actions || []).length === 0 && (
                        <p style={{ color: '#aaa', fontSize: 13, marginBottom: 12 }}>Aucune action configurée. Ajoutez une action ci-dessous.</p>
                      )}

                      {(stageAuto.actions || []).map((action, ai) => (
                        <div key={ai} style={{ background: '#f8f9fa', padding: 14, borderRadius: 8, marginBottom: 10, position: 'relative' }}>
                          <button
                            className="btn btn-icon"
                            style={{ position: 'absolute', top: 8, right: 8, color: '#ccc' }}
                            onClick={() => removeAction(stage.id, ai)}
                            title="Supprimer cette action"
                          >
                            <Icon name="x" size={14} />
                          </button>

                          <div className="form-row">
                            <div className="form-group" style={{ maxWidth: 160 }}>
                              <label>Canal</label>
                              <select value={action.channel} onChange={e => updateAction(stage.id, ai, 'channel', e.target.value)}>
                                <option value="mail">Email</option>
                                <option value="whatsapp">WhatsApp</option>
                              </select>
                            </div>
                            <div className="form-group" style={{ maxWidth: 200 }}>
                              <label>Délai après entrée colonne</label>
                              <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                                <input type="number" min="0" value={action.delayMinutes || 0}
                                  onChange={e => updateAction(stage.id, ai, 'delayMinutes', parseInt(e.target.value) || 0)}
                                  style={{ width: 70 }}
                                />
                                <span style={{ fontSize: 12, color: '#888' }}>min</span>
                              </div>
                            </div>
                          </div>

                          {action.channel === 'mail' && (
                            <div className="form-group">
                              <label>Objet</label>
                              <input value={action.subject || ''} onChange={e => updateAction(stage.id, ai, 'subject', e.target.value)}
                                placeholder="Ex: Votre candidature {{formation}}" />
                            </div>
                          )}

                          <div className="form-group">
                            <label>Message</label>
                            <textarea value={action.message || ''} onChange={e => updateAction(stage.id, ai, 'message', e.target.value)}
                              rows={3} placeholder="Bonjour {{prenom}}, ..." />
                          </div>

                          <div style={{ fontSize: 11, color: '#aaa' }}>
                            Variables : {templateVars.map((v, i) => (
                              <code key={v} style={{ background: '#e8e8e8', padding: '0 4px', borderRadius: 3, cursor: 'pointer', marginRight: 4 }}
                                onClick={() => updateAction(stage.id, ai, 'message', (action.message || '') + v)}
                              >{v}</code>
                            ))}
                          </div>
                        </div>
                      ))}

                      <button className="btn btn-sm btn-outline" onClick={() => addAction(stage.id)} style={{ marginTop: 4 }}>
                        <Icon name="plus" size={14} /> Ajouter une action
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Pending Queue */}
          <div style={{ marginBottom: 32 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <h2 style={{ fontSize: 18 }}>File d'attente ({pendingQueue.length} en attente)</h2>
              <button className="btn btn-sm btn-outline" onClick={onRefreshQueue}>
                <Icon name="refresh-cw" size={14} /> Rafraîchir
              </button>
            </div>

            {pendingQueue.length === 0 ? (
              <div style={{ background: 'white', padding: 30, borderRadius: 12, textAlign: 'center', color: '#aaa' }}>
                Aucun envoi en attente
              </div>
            ) : (
              <div className="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Candidat</th>
                      <th>Canal</th>
                      <th>Colonne</th>
                      <th>Message</th>
                      <th>Programmé pour</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {pendingQueue.map(item => (
                      <tr key={item.id}>
                        <td><strong>{item.candidateName}</strong></td>
                        <td>
                          <span style={{ padding: '2px 8px', borderRadius: 6, fontSize: 11, fontWeight: 600, color: 'white',
                            background: item.channel === 'mail' ? '#E74C3C' : '#25D366' }}>
                            {item.channel === 'mail' ? 'Email' : 'WhatsApp'}
                          </span>
                        </td>
                        <td>{item.stageLabel}</td>
                        <td style={{ maxWidth: 250, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.message}</td>
                        <td>{new Date(item.scheduledAt).toLocaleString('fr-FR')}</td>
                        <td>
                          <button className="btn btn-sm btn-danger" onClick={() => onCancelQueue(item.id)}>Annuler</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Sent History */}
          {sentQueue.length > 0 && (
            <div>
              <h2 style={{ fontSize: 18, marginBottom: 12 }}>Historique des envois (50 derniers)</h2>
              <div className="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Candidat</th>
                      <th>Canal</th>
                      <th>Colonne</th>
                      <th>Message</th>
                      <th>Envoyé le</th>
                      <th>Source</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sentQueue.map(item => (
                      <tr key={item.id}>
                        <td>{item.candidateName}</td>
                        <td>
                          <span style={{ padding: '2px 8px', borderRadius: 6, fontSize: 11, fontWeight: 600, color: 'white',
                            background: item.channel === 'mail' ? '#E74C3C' : '#25D366' }}>
                            {item.channel === 'mail' ? 'Email' : 'WhatsApp'}
                          </span>
                        </td>
                        <td>{item.stageLabel}</td>
                        <td style={{ maxWidth: 250, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.message}</td>
                        <td>{new Date(item.sentAt).toLocaleString('fr-FR')}</td>
                        <td><span style={{ fontSize: 11, color: '#888' }}>{item.automationId ? 'Auto' : 'Manuel'}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============ STAGE MANAGER MODAL ============
    function StageManagerModal({ config, candidates, onClose, onSave }) {
      const [stages, setStages] = useState(config.stages.map(s => ({ ...s })));
      const [newName, setNewName] = useState('');
      const [newColor, setNewColor] = useState('#3498DB');
      const [editingColorIdx, setEditingColorIdx] = useState(null);

      const PALETTE = ['#9B59B6', '#3498DB', '#F39C12', '#2ECC71', '#27AE60', '#E74C3C', '#95A5A6', '#1ABC9C', '#E91E63', '#FF5722', '#607D8B', '#795548', '#002FA7', '#00BCD4'];

      // Count candidates per stage
      const candidateCount = (stageId) => candidates.filter(c => c.stage === stageId).length;

      // Rename
      const handleRename = (idx, newLabel) => {
        const updated = [...stages];
        updated[idx] = { ...updated[idx], label: newLabel };
        setStages(updated);
      };

      // Move up
      const handleMoveUp = (idx) => {
        if (idx <= 0) return;
        const updated = [...stages];
        [updated[idx - 1], updated[idx]] = [updated[idx], updated[idx - 1]];
        updated.forEach((s, i) => s.order = i);
        setStages(updated);
      };

      // Move down
      const handleMoveDown = (idx) => {
        if (idx >= stages.length - 1) return;
        const updated = [...stages];
        [updated[idx], updated[idx + 1]] = [updated[idx + 1], updated[idx]];
        updated.forEach((s, i) => s.order = i);
        setStages(updated);
      };

      // Delete
      const handleDelete = (idx) => {
        const stage = stages[idx];
        const count = candidateCount(stage.id);
        if (count > 0) {
          alert(`Impossible de supprimer "${stage.label}" : ${count} candidat(s) sont dans cette colonne. Déplacez-les d'abord.`);
          return;
        }
        if (!confirm(`Supprimer la colonne "${stage.label}" ?`)) return;
        const updated = stages.filter((_, i) => i !== idx);
        updated.forEach((s, i) => s.order = i);
        setStages(updated);
      };

      // Change color
      const handleColorChange = (idx, color) => {
        const updated = [...stages];
        updated[idx] = { ...updated[idx], color };
        setStages(updated);
        setEditingColorIdx(null);
      };

      // Add new stage
      const handleAdd = () => {
        if (!newName.trim()) return;
        const id = newName.trim().toLowerCase()
          .replace(/[éèêë]/g, 'e').replace(/[àâä]/g, 'a').replace(/[ùûü]/g, 'u').replace(/[ôö]/g, 'o').replace(/[îï]/g, 'i').replace(/ç/g, 'c')
          .replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        if (stages.find(s => s.id === id)) {
          alert('Une colonne avec cet identifiant existe déjà.');
          return;
        }
        setStages([...stages, { id, label: newName.trim(), color: newColor, order: stages.length }]);
        setNewName('');
        setNewColor('#3498DB');
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ width: 600 }}>
            <div className="modal-header">
              <h2><Icon name="settings" size={20} /> Gérer les colonnes Kanban</h2>
              <button className="btn btn-icon btn-outline" onClick={onClose}><Icon name="x" size={18} /></button>
            </div>
            <div className="modal-body">
              <p style={{ fontSize: 13, color: '#888', marginBottom: 16 }}>
                Réorganisez, renommez, ajoutez ou supprimez les colonnes du Kanban. Les colonnes contenant des candidats ne peuvent pas être supprimées.
              </p>

              <div className="stage-manager-list">
                {stages.map((stage, idx) => (
                  <div key={stage.id} className="stage-manager-item">
                    <div className="grip" title="Position">
                      <Icon name="grip-vertical" size={16} />
                    </div>

                    <div
                      className="color-dot"
                      style={{ background: stage.color }}
                      title="Changer la couleur"
                      onClick={() => setEditingColorIdx(editingColorIdx === idx ? null : idx)}
                    />

                    <input
                      className="stage-name-input"
                      value={stage.label}
                      onChange={e => handleRename(idx, e.target.value)}
                      placeholder="Nom de la colonne"
                    />

                    <span style={{ fontSize: 11, color: '#aaa', minWidth: 30, textAlign: 'center' }}>
                      {candidateCount(stage.id) > 0 ? `${candidateCount(stage.id)}` : '0'}
                    </span>

                    <div className="stage-manager-actions">
                      <button onClick={() => handleMoveUp(idx)} disabled={idx === 0} title="Monter">
                        <Icon name="arrow-up" size={14} />
                      </button>
                      <button onClick={() => handleMoveDown(idx)} disabled={idx === stages.length - 1} title="Descendre">
                        <Icon name="arrow-down" size={14} />
                      </button>
                      <button className="danger" onClick={() => handleDelete(idx)} title="Supprimer">
                        <Icon name="trash" size={14} />
                      </button>
                    </div>

                    {editingColorIdx === idx && (
                      <div className="color-picker-row" style={{ position: 'absolute', marginTop: 50, zIndex: 10, background: 'white', padding: 10, borderRadius: 10, boxShadow: '0 4px 16px rgba(0,0,0,0.15)' }}>
                        {PALETTE.map(c => (
                          <div
                            key={c}
                            className={`color-option ${stage.color === c ? 'selected' : ''}`}
                            style={{ background: c }}
                            onClick={() => handleColorChange(idx, c)}
                          />
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>

              <div className="stage-add-bar">
                <div
                  className="color-dot"
                  style={{ background: newColor, width: 32, height: 32, borderRadius: '50%', border: '2px solid white', boxShadow: '0 0 0 1px #ddd', cursor: 'pointer', flexShrink: 0 }}
                  onClick={() => {
                    const idx = PALETTE.indexOf(newColor);
                    setNewColor(PALETTE[(idx + 1) % PALETTE.length]);
                  }}
                  title="Cliquez pour changer la couleur"
                />
                <input
                  value={newName}
                  onChange={e => setNewName(e.target.value)}
                  placeholder="Nom de la nouvelle colonne..."
                  style={{ flex: 1, padding: '8px 12px', border: '1.5px solid #ddd', borderRadius: 8, fontSize: 14 }}
                  onKeyDown={e => { if (e.key === 'Enter') handleAdd(); }}
                />
                <button className="btn btn-primary" onClick={handleAdd} disabled={!newName.trim()}>
                  <Icon name="plus" size={14} /> Ajouter
                </button>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={onClose}>Annuler</button>
              <button className="btn btn-success" onClick={() => onSave(stages)}>
                <Icon name="check" size={14} /> Enregistrer
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============ CSV IMPORT MODAL ============
    function CSVImportModal({ config, onClose, onImport }) {
      const [step, setStep] = useState(1); // 1: upload, 2: mapping, 3: preview
      const [csvData, setCsvData] = useState(null);
      const [headers, setHeaders] = useState([]);
      const [mapping, setMapping] = useState({});
      const [preview, setPreview] = useState([]);
      const fileRef = useRef(null);

      const targetFields = [
        { key: 'nom', label: 'Nom' },
        { key: 'prenom', label: 'Prénom' },
        { key: 'telephone', label: 'Téléphone' },
        { key: 'email', label: 'Email' },
        { key: 'ecole', label: 'École' },
        { key: 'formation', label: 'Formation' },
        { key: 'chargeAdmission', label: 'Chargé admission' },
      ];

      const handleFile = (file) => {
        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: (result) => {
            setCsvData(result.data);
            setHeaders(result.meta.fields || []);
            // Auto-map by name similarity
            const autoMap = {};
            targetFields.forEach(tf => {
              const match = (result.meta.fields || []).find(h =>
                h.toLowerCase().includes(tf.key.toLowerCase()) ||
                tf.label.toLowerCase().includes(h.toLowerCase()) ||
                h.toLowerCase().replace(/[^a-z]/g, '') === tf.key.toLowerCase()
              );
              if (match) autoMap[tf.key] = match;
            });
            setMapping(autoMap);
            setStep(2);
          }
        });
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
      };

      const generatePreview = () => {
        const mapped = csvData.map(row => {
          const candidate = {};
          targetFields.forEach(tf => {
            candidate[tf.key] = mapping[tf.key] ? (row[mapping[tf.key]] || '').trim() : '';
          });
          candidate.conseillerFormation = '';
          if (candidate.ecole && candidate.formation && config.ecoles[candidate.ecole]?.formations[candidate.formation]) {
            candidate.conseillerFormation = config.ecoles[candidate.ecole].formations[candidate.formation].conseiller || '';
          }
          return candidate;
        }).filter(c => c.nom || c.prenom);
        setPreview(mapped);
        setStep(3);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h2>Importer un fichier CSV</h2>
              <button className="btn btn-icon btn-outline" onClick={onClose}><Icon name="x" size={18} /></button>
            </div>
            <div className="modal-body">
              {step === 1 && (
                <div
                  className="dropzone"
                  onDrop={handleDrop}
                  onDragOver={e => e.preventDefault()}
                  onClick={() => fileRef.current?.click()}
                >
                  <Icon name="upload" size={40} color="#002FA7" />
                  <p style={{ marginTop: 12 }}>Glissez votre fichier CSV ici ou cliquez pour sélectionner</p>
                  <p style={{ fontSize: 12, color: '#aaa', marginTop: 4 }}>Format CSV avec en-têtes (séparateur , ou ;)</p>
                  <input
                    ref={fileRef}
                    type="file"
                    accept=".csv,.txt"
                    style={{ display: 'none' }}
                    onChange={e => { if (e.target.files[0]) handleFile(e.target.files[0]); }}
                  />
                </div>
              )}

              {step === 2 && (
                <>
                  <p style={{ marginBottom: 16, fontSize: 14 }}><strong>{csvData.length}</strong> lignes détectées. Mappez les colonnes :</p>
                  {targetFields.map(tf => (
                    <div key={tf.key} className="mapping-row">
                      <span className="csv-col">{tf.label}</span>
                      <span style={{ color: '#aaa' }}>←</span>
                      <select
                        value={mapping[tf.key] || ''}
                        onChange={e => setMapping(m => ({ ...m, [tf.key]: e.target.value }))}
                        style={{ flex: 1, padding: '6px 10px', borderRadius: 6, border: '1.5px solid #ddd' }}
                      >
                        <option value="">-- Ignorer --</option>
                        {headers.map(h => <option key={h} value={h}>{h}</option>)}
                      </select>
                    </div>
                  ))}
                </>
              )}

              {step === 3 && (
                <>
                  <p style={{ marginBottom: 16, fontSize: 14 }}>
                    <strong>{preview.length}</strong> candidats prêts à importer (stage: Voeu reçu)
                  </p>
                  <div className="preview-table">
                    <table>
                      <thead>
                        <tr>
                          <th>Nom</th><th>Prénom</th><th>Email</th><th>Tél</th><th>École</th><th>Formation</th>
                        </tr>
                      </thead>
                      <tbody>
                        {preview.slice(0, 15).map((c, i) => (
                          <tr key={i}>
                            <td>{c.nom}</td><td>{c.prenom}</td><td>{c.email}</td><td>{c.telephone}</td><td>{c.ecole}</td><td>{c.formation}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {preview.length > 15 && <p style={{ textAlign: 'center', color: '#888', padding: 8 }}>... et {preview.length - 15} de plus</p>}
                  </div>
                </>
              )}
            </div>
            <div className="modal-footer">
              {step > 1 && (
                <button className="btn btn-outline" onClick={() => setStep(s => s - 1)}>Retour</button>
              )}
              <button className="btn btn-outline" onClick={onClose}>Annuler</button>
              {step === 2 && (
                <button className="btn btn-primary" onClick={generatePreview}>Prévisualiser</button>
              )}
              {step === 3 && (
                <button className="btn btn-success" onClick={() => onImport(preview)}>
                  <Icon name="check" size={14} /> Importer {preview.length} candidats
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============ HELPERS ============
    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}min`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}j`;
      return `${Math.floor(days / 7)}sem`;
    }

    // ============ RENDER ============
    ReactDOM.createRoot(document.getElementById('root')).render(<AppWrapper />);
  </script>
</body>
